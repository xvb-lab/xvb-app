<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XVB - Manutenzione</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        @font-face {
            font-family: "Samsung Sharp Sans";
            src: url("../fonts/SamsungSharpSans-Bold.ttf") format("truetype");
            font-weight: 700;
        }

        :root {
            --primary: #d0bcff;
            --on-surface: #f4eff4;
            --bg-dark: #0a0a0e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-dark);
            /* Gradiente dinamico XVB */
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0e 100%);
            font-family: "Samsung Sharp Sans", sans-serif;
            color: var(--on-surface);
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px;
            max-width: 90%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .icon-box {
            font-size: 60px;
            color: var(--primary);
            margin-bottom: 20px;
            animation: pulse 2s infinite ease-in-out;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 15px;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 16px;
            color: rgba(244, 239, 244, 0.6);
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(208, 188, 255, 0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            margin: 0 auto;
            animation: spin 1s linear infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .logo-small {
            height: 25px;
            margin-top: 40px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-box">
            <i class="fa-solid fa-screwdriver-wrench"></i>
        </div>
        <h1>In Manutenzione</h1>
        <p>Stiamo aggiornando XVB per offrirti un'esperienza migliore.<br>Torniamo tra pochissimo.</p>
        
        <div class="loader"></div>

        <img src="assets/logo.png" alt="XVB Logo" class="logo-small">
    </div>

</body>
</html>
